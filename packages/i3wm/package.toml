[package]
name = "i3wm"
version = "4.25.1"
description = "Simple tilling X11 window manager"

[source]
src = "https://i3wm.org/downloads/i3-4.25.1.tar.xz"
sha256 = "4a742bbe81b9e5ee6057f42a8e3c691d88894e93f1a5d81fe239128512ac05c0"

[dependencies]
runtime = [""]
build = [ 
	"libev"
	"libxkbcommon"
	"pango"
	"libstartup-notification"
	"yajl"
	"xorg-libraries"
] # omitted asciidoc and xmlto since the tarball *should* have pregenerated documentation (hopefully)

[build]
system = "meson"
